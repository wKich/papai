services:
  # One-shot service that patches a missing Kaneo DB migration:
  # migration 0008 created `user_id text NOT NULL` on the apikey table
  # but the @better-auth/api-key plugin only writes `reference_id`, never
  # `user_id`, so every API key creation returns 500. This drops the NOT
  # NULL constraint idempotently after Kaneo has run its own migrations.
  kaneo-db-fix:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: ${KANEO_POSTGRES_PASSWORD:?KANEO_POSTGRES_PASSWORD is required}
    command:
      - sh
      - -c
      - >-
        until psql -v ON_ERROR_STOP=1
        -h kaneo-postgres
        -U ${KANEO_POSTGRES_USER:-kaneo}
        -d ${KANEO_POSTGRES_DB:-kaneo}
        -c 'ALTER TABLE apikey ALTER COLUMN user_id DROP NOT NULL';
        do echo 'Waiting for Kaneo migrations...'; sleep 3; done
    depends_on:
      kaneo-api:
        condition: service_healthy

  papai:
    image: ${IMAGE:-ghcr.io/wkich/papai:latest}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/papai.db
      KANEO_INTERNAL_URL: ${KANEO_INTERNAL_URL:-http://kaneo-api:1337}
    volumes:
      - papai-data:/data
    depends_on:
      kaneo-api:
        condition: service_healthy
      kaneo-db-fix:
        condition: service_completed_successfully

  kaneo-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KANEO_POSTGRES_DB:-kaneo}
      POSTGRES_USER: ${KANEO_POSTGRES_USER:-kaneo}
      POSTGRES_PASSWORD: ${KANEO_POSTGRES_PASSWORD:?KANEO_POSTGRES_PASSWORD is required}
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${KANEO_POSTGRES_USER:-kaneo}', '-d', '${KANEO_POSTGRES_DB:-kaneo}']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - kaneo-postgres-data:/var/lib/postgresql/data

  kaneo-api:
    image: ghcr.io/usekaneo/api:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${KANEO_POSTGRES_USER:-kaneo}:${KANEO_POSTGRES_PASSWORD}@kaneo-postgres:5432/${KANEO_POSTGRES_DB:-kaneo}
      AUTH_SECRET: ${KANEO_AUTH_SECRET:?KANEO_AUTH_SECRET is required}
      KANEO_CLIENT_URL: ${KANEO_CLIENT_URL:?KANEO_CLIENT_URL is required}
      KANEO_API_URL: ${KANEO_CLIENT_URL:?KANEO_CLIENT_URL is required}/api
      DISABLE_REGISTRATION: ${KANEO_DISABLE_REGISTRATION:-false}
      DISABLE_GUEST_ACCESS: ${KANEO_DISABLE_GUEST_ACCESS:-true}
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:1337/api/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      kaneo-postgres:
        condition: service_healthy

  kaneo-web:
    image: ghcr.io/usekaneo/web:latest
    restart: unless-stopped
    environment:
      KANEO_API_URL: ${KANEO_CLIENT_URL:?KANEO_CLIENT_URL is required}/api
      KANEO_CLIENT_URL: ${KANEO_CLIENT_URL:?KANEO_CLIENT_URL is required}
    depends_on:
      - kaneo-api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      KANEO_CLIENT_URL: ${KANEO_CLIENT_URL:?KANEO_CLIENT_URL is required}
    depends_on:
      - kaneo-web
      - kaneo-api

volumes:
  papai-data:
  kaneo-postgres-data:
  caddy-data:
  caddy-config:
