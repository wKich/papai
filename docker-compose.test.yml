# Overlay for local integration tests.
# Exposes kaneo-api to the host on KANEO_API_PORT (default 11337) so test
# scripts (test-provision.ts, test-migration.ts) can reach it at localhost.
services:
  kaneo-api:
    ports:
      - '${KANEO_API_PORT:-11337}:1337'
    # Limit memory to prevent OOM on the host system
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Disable non-essential services in tests to conserve memory
  kaneo-web:
    deploy:
      replicas: 0

  caddy:
    deploy:
      replicas: 0

  papai:
    deploy:
      replicas: 0

  kaneo-postgres:
    # Limit memory to prevent OOM
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
