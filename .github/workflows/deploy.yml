name: Deploy

on:
  workflow_call:
    inputs:
      prerelease:
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.push.outputs.digest }}
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lowercase
        run: |
          echo "image_name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ inputs.prerelease == false }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          SSH_USER: ${{ vars.SSH_USER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          IMAGE: ${{ env.REGISTRY }}/${{ needs.build-and-push.outputs.image_name }}@${{ needs.build-and-push.outputs.digest }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          trap 'rm -f ~/.ssh/id_rsa' EXIT
          printf '%s\n' "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" mkdir -p "~/${GITHUB_REPOSITORY##*/}"
          scp -i ~/.ssh/id_rsa -P "$SSH_PORT" docker-compose.yml "$SSH_USER@$SSH_HOST:~/${GITHUB_REPOSITORY##*/}/docker-compose.yml"
          ssh -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash << EOF
          set -e
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          cd ~/${GITHUB_REPOSITORY##*/}
          printf 'TELEGRAM_BOT_TOKEN=%s\nTELEGRAM_USER_ID=%s\n' "${TELEGRAM_BOT_TOKEN}" "${TELEGRAM_USER_ID}" > .env
          chmod 600 .env
          IMAGE="${IMAGE}" docker compose pull
          IMAGE="${IMAGE}" docker compose up -d --remove-orphans
          docker image prune -f
          EOF

  deploy-huly:
    name: Deploy Huly
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Huly via SSH
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
          SSH_HOST: ${{ vars.SSH_HOST }}
          SSH_PORT: ${{ vars.SSH_PORT || '22' }}
          SSH_USER: ${{ vars.SSH_USER }}
          HULY_HOST_ADDRESS: ${{ vars.HULY_HOST_ADDRESS }}
          HULY_VERSION: ${{ vars.HULY_VERSION }}
          HULY_SECRET: ${{ secrets.HULY_SECRET }}
          HULY_CR_USER_PASSWORD: ${{ secrets.HULY_CR_USER_PASSWORD }}
          HULY_REDPANDA_ADMIN_PWD: ${{ secrets.HULY_REDPANDA_ADMIN_PWD }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          trap 'rm -f ~/.ssh/id_rsa' EXIT
          printf '%s\n' "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" mkdir -p ~/huly
          scp -i ~/.ssh/id_rsa -P "$SSH_PORT" huly/docker-compose.yml huly/Caddyfile "$SSH_USER@$SSH_HOST:~/huly/"
          ssh -i ~/.ssh/id_rsa -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" bash << EOF
          set -e
          cd ~/huly
          printf '%s\n' \
            'DOCKER_NAME=huly' \
            'HULY_VERSION=${HULY_VERSION}' \
            'HOST_ADDRESS=${HULY_HOST_ADDRESS}' \
            'SECRET=${HULY_SECRET}' \
            'CR_DATABASE=huly' \
            'CR_USERNAME=root' \
            'CR_USER_PASSWORD=${HULY_CR_USER_PASSWORD}' \
            'CR_DB_URL=postgresql://root@cockroach:26257/huly?sslmode=disable' \
            'REDPANDA_ADMIN_USER=admin' \
            'REDPANDA_ADMIN_PWD=${HULY_REDPANDA_ADMIN_PWD}' \
            'DEFAULT_LANGUAGE=en' \
            'LAST_NAME_FIRST=true' \
            > .env
          chmod 600 .env
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
