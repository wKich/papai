name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install
      - name: Run all checks
        run: bun check
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Install dependencies
        run: bun install
      - name: Create env file
        run: |
          echo "KANEO_POSTGRES_PASSWORD=test-password" >> .env
          echo "KANEO_AUTH_SECRET=test-auth-secret-for-ci-environment" >> .env
          echo "KANEO_CLIENT_URL=http://localhost:11337" >> .env
      - name: Run E2E tests
        run: bun test:e2e
        env:
          E2E_KANEO_URL: http://localhost:11337
