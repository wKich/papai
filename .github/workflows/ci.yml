name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install
      - name: Build client
        run: bun build:client
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: public/
          retention-days: 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install
      - name: Run security scan
        run: bun security
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep-results.sarif') != ''
        with:
          sarif_file: semgrep-results.sarif

  check:
    name: Checks
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/
      - name: Run all checks
        run: bun check:full

  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Install dependencies
        run: bun install
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/
      - name: Create env file
        run: |
          echo "KANEO_POSTGRES_PASSWORD=test-password" >> .env
          echo "KANEO_AUTH_SECRET=test-auth-secret-for-ci-environment" >> .env
          echo "KANEO_CLIENT_URL=http://localhost:11337" >> .env
          echo "TASK_PROVIDER=kaneo" >> .env
      - name: Run E2E tests
        run: bun test:e2e
        env:
          E2E_KANEO_URL: http://localhost:11337

  mutation-testing:
    name: Mutation Testing
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: public/

      - name: Restore Stryker incremental cache
        uses: actions/cache@v4
        with:
          path: reports/stryker-incremental.json
          key: stryker-incremental-${{ github.base_ref }}-${{ github.sha }}
          restore-keys: |
            stryker-incremental-${{ github.base_ref }}-
            stryker-incremental-master-

      - name: Run mutation testing
        run: bun run test:mutate:changed

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: reports/mutation.html
          retention-days: 14
