services:
  web:
    image: ${DOCKERHUB_USER:-makeplane}/plane-frontend:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${WEB_URL}/api
      NEXT_PUBLIC_DEPLOY_URL: ${WEB_URL}
    networks:
      - plane-net
    volumes:
      - plane-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  space:
    image: ${DOCKERHUB_USER:-makeplane}/plane-space:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${WEB_URL}/api
      NEXT_PUBLIC_DEPLOY_URL: ${WEB_URL}
    networks:
      - plane-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  api:
    image: ${DOCKERHUB_USER:-makeplane}/plane-backend:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://plane:plane@postgres:5432/plane}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      WEB_URL: ${WEB_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      DEFAULT_EMAIL: ${DEFAULT_EMAIL:-captain@plane.so}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-captain@plane.so}
      USE_MINIO: ${USE_MINIO:-1}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-miniosecret}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_CUSTOM_ENDPOINT: ${AWS_S3_CUSTOM_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GPT_ENGINE: ${GPT_ENGINE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-1}
      MAGIC_LINK_LOGIN: ${MAGIC_LINK_LOGIN:-0}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_FROM: ${EMAIL_FROM:-}
    networks:
      - plane-net
    volumes:
      - plane-logs:/var/log/nginx
      - plane-api-data:/code
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  worker:
    image: ${DOCKERHUB_USER:-makeplane}/plane-worker:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on:
      - api
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://plane:plane@postgres:5432/plane}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      WEB_URL: ${WEB_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      USE_MINIO: ${USE_MINIO:-1}
      AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minio}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-miniosecret}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME:-uploads}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_CUSTOM_ENDPOINT: ${AWS_S3_CUSTOM_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GPT_ENGINE: ${GPT_ENGINE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-0}
      ENABLE_SIGNUP: ${ENABLE_SIGNUP:-1}
      MAGIC_LINK_LOGIN: ${MAGIC_LINK_LOGIN:-0}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
      EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}
      EMAIL_FROM: ${EMAIL_FROM:-}
    networks:
      - plane-net
    volumes:
      - plane-logs:/var/log/nginx
      - plane-api-data:/code
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  beat-worker:
    image: ${DOCKERHUB_USER:-makeplane}/plane-worker:${APP_RELEASE:-stable}
    restart: unless-stopped
    depends_on:
      - api
      - postgres
      - redis
    command: celery -A plane.celery beat --loglevel=info
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://plane:plane@postgres:5432/plane}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY}
      WEB_URL: ${WEB_URL}
    networks:
      - plane-net
    volumes:
      - plane-api-data:/code
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plane
      POSTGRES_PASSWORD: plane
      POSTGRES_DB: plane
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - plane-net
    volumes:
      - postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane -d plane"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    networks:
      - plane-net
    volumes:
      - redis-data:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniosecret}
    networks:
      - plane-net
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: nginx reverse proxy
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    depends_on:
      - web
      - api
      - space
    networks:
      - plane-net
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - plane-logs:/var/log/nginx
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  plane-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  plane-logs:
    driver: local
  plane-api-data:
    driver: local
